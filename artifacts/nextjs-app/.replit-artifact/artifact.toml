kind = "web"
  previewPath = "/"
  title = "SEO Agency (Next.js)"
  id = "artifacts/nextjs-app"
  router = "path"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 4321

  [services.development]
  run = "pnpm --filter @workspace/nextjs-app run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/nextjs-app", "run", "build" ]
  run = "pnpm --filter @workspace/nextjs-app run start"

  [services.env]
  PORT = "4321"
